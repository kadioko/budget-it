<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, maximum-scale=1, user-scalable=0" />
    <meta name="application-name" content="Budget It" />
    <meta name="apple-mobile-web-app-title" content="Budget It" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="description" content="Track spending, manage accounts, and stay on top of your budget with Budget It." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="msapplication-TileColor" content="#1d4ed8" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Budget It" />
    <meta property="og:description" content="Track spending, manage accounts, and stay on top of your budget with Budget It." />
    <meta property="og:image" content="/brand-logo.png" />
    <meta property="og:site_name" content="Budget It" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Budget It" />
    <meta name="twitter:description" content="Track spending, manage accounts, and stay on top of your budget with Budget It." />
    <meta name="twitter:image" content="/brand-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <title>Budget It</title>
    <style>
      :root {
        --bg-main: #f4f7fb;
        --bg-card: #ffffff;
        --bg-secondary: rgba(255,255,255,0.88);
        --bg-tertiary: rgba(255,255,255,0.64);
        --bg-nav: rgba(255,255,255,0.72);

        --text-main: #0f172a;
        --text-secondary: #475569;
        --text-tertiary: #64748b;
        --text-muted: #94a3b8;

        --border-color: rgba(148,163,184,0.22);
        --border-light: rgba(255,255,255,0.4);

        --primary: #1d4ed8;
        --primary-dark: #1e40af;
        --shadow-sm: 0 8px 24px rgba(15,23,42,0.06);
        --shadow-md: 0 18px 44px rgba(15,23,42,0.08);
        --shadow-lg: 0 28px 72px rgba(15,23,42,0.12);
        --shadow-xl: 0 36px 96px rgba(15,23,42,0.14);

        --success: #059669;
        --success-bg: #d5f4e6;
        --success-border: #bbf7d0;
        --success-text: #166534;

        --danger: #e74c3c;
        --danger-bg: #fadbd8;
        --danger-border: #f5c6c6;
        --danger-text: #c0392b;
        --app-font-body: "Manrope", "Segoe UI", sans-serif;
        --app-font-display: "Space Grotesk", "Manrope", sans-serif;
      }

      *, *::before, *::after {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        height: auto;
        overflow-x: hidden;
        overflow-y: auto;
        background: var(--bg-main);
        color: var(--text-main);
        font-family: var(--app-font-body);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        pointer-events: none;
        z-index: 0;
        filter: blur(20px);
      }
      body::before {
        top: -120px;
        right: -80px;
        width: 360px;
        height: 360px;
        background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, rgba(59,130,246,0) 72%);
      }
      body::after {
        left: -120px;
        bottom: -160px;
        width: 420px;
        height: 420px;
        background: radial-gradient(circle, rgba(16,185,129,0.14) 0%, rgba(16,185,129,0) 70%);
      }
      #root {
        position: relative;
        display: block;
        min-height: 100vh;
        height: auto;
        flex: none;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(error => {
            console.error('ServiceWorker registration failed:', error);
          });
        });
      }
    </script>
  </body>
</html>
